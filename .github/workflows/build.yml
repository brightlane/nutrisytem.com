name: Build and Deploy NutriStem Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        run: python build.py

      - name: Wipe all old SaneBox and legacy files from repo root
        run: |
          echo "=== Removing all old files from repo root ==="
          find . -maxdepth 1 -type f \
            ! -name 'build.py' \
            ! -name '.gitignore' \
            ! -name 'README.md' \
            -delete

          echo "=== Removing old folders ==="
          for dir in public scripts well-known node_modules; do
            [ -d "$dir" ] && rm -rf "$dir" && echo "Removed: $dir"
          done

          echo "=== Copying dist/ to repo root ==="
          cp -r dist/. .
          rm -rf dist/

          echo "=== Done. Root files: ==="
          ls -1 | head -30

      - name: Commit cleaned repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -A
          git diff --staged --quiet || git commit -m "NutriStem v3 deploy [$(date -u '+%Y-%m-%d')]"
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
